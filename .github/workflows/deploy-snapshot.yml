name: Deploy Snapshots

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  snapshot:
    name: Deploy snapshot to OSSRH
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Deploy snapshot
        env:
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          ./mvnw -B deploy -DskipTests -Dgpg.skip=true -Denforcer.skip=true -Dnjord.autoPublish -Pmaveniverse-release -s .github/release-settings.xml
